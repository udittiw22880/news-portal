<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#ffffff;
}

/* TOP SECTION */

.top-section{
background:#6b0f0f;
color:white;
text-align:center;
padding:40px;
border-bottom-left-radius:40px;
border-bottom-right-radius:40px;
}

.top-section h1{
font-size:40px;
font-weight:900;
margin:0;
}

.top-section p{
font-size:18px;
}

/* NAVIGATION */

nav{
margin-top:20px;
}

nav a{
text-decoration:none;
margin:8px;
padding:10px 18px;
background:white;
color:#6b0f0f;
border-radius:20px;
font-weight:bold;
}

/* NEWS AREA */

.bottom-section{
padding:30px;
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* NEWS CARD */

.news-card{
background:#6b0f0f;
color:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.news-card img{
width:100%;
height:180px;
object-fit:cover;
}

.news-content{
padding:15px;
}

.news-content h2{
margin-top:0;
font-weight:800;
}

.news-content p{
opacity:0.9;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
color:#555;
}

/* MOBILE RESPONSIVE */

@media (max-width:600px){

.top-section h1{
font-size:28px;
}

nav a{
display:inline-block;
margin:5px;
padding:8px 12px;
}

}

</style>

</head>
